<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>水母群聊 · 阅读时间</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0b0b0f;
      font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
      color: #e3e3e8;
    }
    .card {
      max-width: 680px;
      width: 100%;
      background: #14141c;
      border-radius: 36px;
      padding: 30px 28px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 1px #2a2a36 inset;
    }
    .notice {
      background: #1e1e2a;
      border-left: 4px solid #b7a0ff;
      padding: 18px 20px;
      border-radius: 20px;
      margin-bottom: 28px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #cbcbd6;
    }
    .notice strong { color: #e0d6ff; }
    .notice ul { list-style: none; margin-top:8px; padding-left:4px; }
    .notice ul li { padding:4px 0; display:flex; align-items:baseline; gap:6px; }
    .notice ul li::before { content:"•"; color:#8f7fd6; font-weight:bold; font-size:1.2rem; }
    .supplement {
      margin-top:12px; padding-top:12px;
      border-top:1px dashed #2f2f3e;
      font-size:0.85rem; color:#a8a8b8; font-style:italic;
    }
    .header {
      display:flex; justify-content:space-between; align-items:baseline;
      margin-bottom:24px; flex-wrap:wrap; gap:6px 12px;
    }
    .header h2 {
      font-weight:500; font-size:1.5rem;
      background:linear-gradient(135deg,#d4caff,#b3a0f0);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .header .badge {
      font-size:0.75rem; background:#282838; padding:6px 14px;
      border-radius:40px; color:#bdbdd0; border:1px solid #3b3b4e;
      white-space:nowrap;
    }
    .entry-grid { display:flex; flex-direction:column; gap:4px; }
    .entry-wrapper { margin-bottom:0; }
    .entry-item {
      background:#1c1c28; border-radius:28px; padding:18px 22px;
      border:1px solid #2c2c3e; cursor:pointer;
      box-shadow:0 4px 8px rgba(0,0,0,0.2);
      display:flex; justify-content:space-between; align-items:center;
      transition:all 0.2s ease;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .entry-item:hover { background:#242433; border-color:#4f4a70; transform:scale(1.01); }
    .entry-item:active { transform:scale(0.98); }
    .entry-item.expanded {
      border-color:#6b5d9e; border-radius:28px 28px 0 0;
      box-shadow:0 8px 16px rgba(0,0,0,0.5);
    }
    .entry-left { display:flex; flex-direction:column; gap:2px; flex:1; }
    .entry-title { font-size:1.4rem; font-weight:500; color:#f2edff; }
    .entry-sub { font-size:0.85rem; color:#9f9fb2; font-style:italic; opacity:0.8; }
    .entry-arrow {
      font-size:1.8rem; color:#8878c0; transition:transform 0.2s;
      line-height:1; flex-shrink:0; margin-left:12px;
    }
    .entry-item:hover .entry-arrow { transform:translateX(6px); color:#b8a6ff; }
    .entry-item.expanded .entry-arrow { transform:rotate(90deg); color:#b8a6ff; }
    .directory-panel {
      background:#13131e; border-radius:0 0 28px 28px;
      padding:18px 20px 20px; border:1px solid #33334a; border-top:none;
      box-shadow:0 8px 0 #0a0a10, 0 12px 28px rgba(0,0,0,0.6);
      display:none; animation:fadeSlide 0.25s ease forwards;
      margin-bottom:16px;
    }
    .directory-panel.active { display:block; }
    @keyframes fadeSlide {
      0% { opacity:0; transform:translateY(-6px); }
      100% { opacity:1; transform:translateY(0); }
    }
    .directory-header {
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid #2b2b40; padding-bottom:10px; margin-bottom:14px;
    }
    .directory-header span { font-size:0.9rem; color:#b9b2d6; }
    .close-dir {
      background:none; border:none; color:#7a6f9e;
      font-size:1.3rem; cursor:pointer; padding:0 6px;
      transition:0.15s;
    }
    .close-dir:hover { color:#d6caff; transform:rotate(90deg); }
    .dir-list { display:flex; flex-direction:column; gap:8px; }
    .dir-item {
      background:#1d1d2b; padding:12px 18px; border-radius:40px;
      display:flex; align-items:center; justify-content:space-between;
      border:1px solid #2e2e44; cursor:pointer;
      color:#d6d0ec; font-size:1rem; transition:0.15s;
    }
    .dir-item:hover { background:#282842; border-color:#6b5d9e; color:#f5f0ff; padding-left:24px; }
    .dir-item .dir-index {
      color:#6f6296; font-size:0.8rem; background:#27273a;
      padding:2px 12px; border-radius:30px; border:1px solid #3e3e5a;
      flex-shrink:0; margin-left:12px;
    }
    .footnote {
      margin-top:20px; font-size:0.7rem; text-align:center;
      color:#55556a; border-top:1px solid #222235; padding-top:18px;
    }
    @media (max-width:480px) {
      .card { padding:22px 16px 30px; }
      .entry-title { font-size:1.2rem; }
      .entry-sub { font-size:0.75rem; }
      .dir-item { font-size:0.95rem; padding:10px 14px; }
      .directory-panel { padding:14px 14px 16px; }
      .entry-item { padding:14px 16px; }
      .entry-arrow { font-size:1.5rem; }
    }
    @media (max-width:380px) {
      .card { padding:16px 10px 24px; }
      .entry-title { font-size:1.0rem; }
      .header h2 { font-size:1.2rem; }
      .header .badge { font-size:0.65rem; padding:4px 10px; }
    }
  </style>
</head>
<body>

  <div class="footnote">时间碎片</div>
</div>

<script>

    { title: '第四章 · 礼物by修城', href: '红手套4.html' },
    { title: '第五章 · 木马by修城', href: '红手套5.html' }
  ]
},
      wolf: {
        name: '野狼',
        subtitle: '"我不想要自由，我只想要她"',
        list: [
          { title: '第一章 · 请为西西里亚开枝散叶吧！by水母', href: '野狼1.html' }
        ]
      },
      ghost: {
        name: '幽灵',
        subtitle: '"欢迎回家boss，您是想先用餐，还是先洗浴？"',
        list: [
          { title: '第一章 · 请为西西莉亚开枝散叶吧！by水母', href: '幽灵1.html' },
          { title: '第二章 · 舞会by水母', href: '幽灵2.html' }
        ]
      },
    puppeteer: {
  name: '提线人',
  subtitle: '"让坐轮椅的上战场？你脑子有病吧"',
  list: [
    { title: '第一章 · 请为西西莉亚开枝散叶吧！by水母', href: '提线人1.html' },

    { title: '第三章 · 你x提线人by 老中医', href: '提线人3.html' },

    { title: '第五章 · boss，我爬不动了by fantasma', href: '提线人5.html' }
  ]
},
      tyrant: {
        name: '暴君',
        subtitle: '"这里是泰拉，我是泰拉的暴君"',
        list: [
          { title: '第一章 · 请为西西莉亚开枝散叶吧！by水母', href: '暴君1.html' }
        ]
      },
      nobody: {
        name: '某某人',
        subtitle: '"我是你的某某人"',
        list: [
          { title: '第一章 · 请为西西莉亚开枝散叶吧！by水母', href: '某某人1.html' }
        ]
      },
      chef: {
  name: '主厨',
  subtitle: '"我是桑托罗餐厅的主厨"',
  list: [
    { title: '第一章 · 主厨（春梦）by宋尧霜', href: '主厨1.html' },
    { title: '第二章 · 请为西西利亚开枝散叶吧6by水母', href: '主厨2.html' }
  ]
},
      fool: {
        name: '愚者',
        subtitle: '"这世上没有比我对命运更忠诚的人了"',
        list: [
          { title: '第一章 · 论杯子的养成与护理 by水母', href: '愚者1.html' }
        ]
      },
      general: {
  name: '将军',
  subtitle: '"我会帮你重建西西利亚，帮你扫清一切阻碍"',
  list: [
    { title: '第一章 · 将军（春梦）by宋尧霜', href: '将军1.html' },
    { title: '第二章 · 你x将军by修城', href: '将军2.html' }
  ]
},
      windward: {
        name: '东南西北',
        subtitle: '"这一切只是逢场作戏，佳期一梦吗？"',
        list: [
          { title: '第一章 · 东南西北gb by困困困困', href: '东南西北1.html' }
        ]
      },
      endy: {
        name: '九命猫',
        subtitle: '"你想要的我都可以给你！"',
        list: [
          { title: '第一章 · 九命猫（春梦）by宋尧霜', href: '九命猫1.html' }
        ]
      },
      interviewer: {
        name: '面试官',
        subtitle: '"恭喜你，你被录取了"',
        list: [
          { title: '第一章 · 面试官（春梦）by宋尧霜', href: '面试官1.html' }
        ]
      },
      rosasr: {
        name: '罗萨斯',
        subtitle: '"我恨你，但我更恨你不爱我"',
        list: [
          { title: '第一章 · 戒断by水母', href: '罗萨斯1.html' },
          { title: '第二章 · 成瘾性by水母', href: '罗萨斯2.html' },
          { title: '第三章 · 春梦1by宋尧霜', href: '罗萨斯3.html' },
          { title: '第四章 · 春梦2by宋尧霜', href: '罗萨斯4.html' }
        ]
      },
      liquidator: {
        name: '刀锋',
        subtitle: '"收到，请告诉我任务目标"',
        list: [
          { title: '第一章 · 回雁by水母', href: '刀锋1.html' }
        ]
      },
      NP: {
        name: 'NP',
        subtitle: '"np小剧场，注意甄别"',
        list: [
          { title: '第一章 · [你x暴君+刀锋]boss我们这样真的好吗by水母', href: 'np1.html' },
          { title: '第二章 · 一次单纯的旅行（1vs5）by雾Euro', href: 'np2.html' },
          { title: '第三章 · [你x幽灵+面试官]zc什么的还是放一边吧by水母', href: 'np3.html' }
        ]
      }
    };

    var grid = document.getElementById('entryGrid');
    if (!grid) return;
    grid.innerHTML = '';

    Object.keys(articlesData).forEach(function(roleKey) {
      var role = articlesData[roleKey];
      if (!role) return;

      var wrapper = document.createElement('div');
      wrapper.className = 'entry-wrapper';

      var item = document.createElement('div');
      item.className = 'entry-item';
      item.dataset.target = roleKey;
      item.innerHTML =
        '<div class="entry-left">' +
          '<div class="entry-title">' + role.name + '</div>' +
          '<div class="entry-sub">' + (role.subtitle || '') + '</div>' +
        '</div>' +
        '<div class="entry-arrow">↗</div>';

      var panel = document.createElement('div');
      panel.className = 'directory-panel';
      panel.id = roleKey + 'Dir';
      panel.innerHTML =
        '<div class="directory-header">' +
          '<span>' + role.name + ' · 文章目录</span>' +
          '<button class="close-dir" data-close="' + roleKey + '">✕</button>' +
        '</div>' +
        '<div class="dir-list" id="' + roleKey + 'DirList"></div>';

      wrapper.appendChild(item);
      wrapper.appendChild(panel);
      grid.appendChild(wrapper);
    });

    var dirPanels = {};
    var dirLists = {};
    Object.keys(articlesData).forEach(function(roleKey) {
      var panel = document.getElementById(roleKey + 'Dir');
      var list = document.getElementById(roleKey + 'DirList');
      if (panel) dirPanels[roleKey] = panel;
      if (list) dirLists[roleKey] = list;
    });

    function hideAllDirs() {
      Object.keys(articlesData).forEach(function(roleKey) {
        if (dirPanels[roleKey]) dirPanels[roleKey].classList.remove('active');
        var entry = document.querySelector('.entry-item[data-target="' + roleKey + '"]');
        if (entry) entry.classList.remove('expanded');
      });
    }

    function renderDirList(roleKey) {
      var role = articlesData[roleKey];
      if (!role) return;
      var container = dirLists[roleKey];
      if (!container) return;
      container.innerHTML = '';
      role.list.forEach(function(article, index) {
        var div = document.createElement('div');
        div.className = 'dir-item';
        div.innerHTML =
          '<span>' + article.title + '</span>' +
          '<span class="dir-index">#' + (index + 1) + '</span>';
        div.addEventListener('click', function(e) {
          e.stopPropagation();
          if (article.href) window.location.href = article.href;
          else console.warn('无链接:', article.title);
        });
        container.appendChild(div);
      });
    }

    function toggleDirectory(roleKey) {
      var panel = dirPanels[roleKey];
      if (!panel) return;
      if (panel.classList.contains('active')) {
        panel.classList.remove('active');
        var entry = document.querySelector('.entry-item[data-target="' + roleKey + '"]');
        if (entry) entry.classList.remove('expanded');
        return;
      }
      hideAllDirs();
      panel.classList.add('active');
      var entry = document.querySelector('.entry-item[data-target="' + roleKey + '"]');
      if (entry) entry.classList.add('expanded');
      renderDirList(roleKey);
    }

    document.querySelectorAll('.entry-item').forEach(function(item) {
      item.addEventListener('click', function(e) {
        var target = this.dataset.target;
        if (target && articlesData[target]) toggleDirectory(target);
      });
    });

    document.querySelectorAll('.close-dir').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var role = this.dataset.close;
        if (role && dirPanels[role]) {
          dirPanels[role].classList.remove('active');
          var entry = document.querySelector('.entry-item[data-target="' + role + '"]');
          if (entry) entry.classList.remove('expanded');
        }
      });
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.card')) hideAllDirs();
    });

    console.log('🌊 已加载，共 ' + Object.keys(articlesData).length + ' 个角色');
  })();
</script>
</body>
</html>
